<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
*{
  margin:0;
  box-sizing:border-box;
  font-family:system-ui,sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f2f2f2;
}

/* ================= APP ================= */

.app{
  width:360px;
  height:640px;
  border-radius:26px;
  overflow:hidden;
  position:relative;
  box-shadow:0 30px 60px rgba(0,0,0,.25);
}


/* ================= BACKGROUND ================= */

/* step 1: muncul dulu */
.bg{
  position:absolute;
  inset:-30px;
  background:url("assets/flower_bg.jpg") center/cover no-repeat;

  opacity:0;
  transform:scale(1.15);

  animation:
    bgReveal 1.4s ease forwards,
    wind 10s ease-in-out 1.4s infinite alternate; /* mulai goyang setelah muncul */
}

/* fade + zoom */
@keyframes bgReveal{
  to{
    opacity:1;
    transform:scale(1);
  }
}

/* step 2: goyang angin */
@keyframes wind{
  0%   { transform: translate(0,0) rotate(0deg) scale(1); }
  25%  { transform: translate(-4px,2px) rotate(-0.4deg) scale(1.01); }
  50%  { transform: translate(3px,-3px) rotate(0.5deg) scale(1.02); }
  75%  { transform: translate(-2px,3px) rotate(-0.3deg) scale(1.01); }
  100% { transform: translate(0,0) rotate(0deg) scale(1); }
}


/* ================= CONTENT ================= */

.page{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* step 3: muncul terakhir */
.card{
  background:rgba(255,255,255,.92);
  padding:32px 42px;
  border-radius:18px;
  box-shadow:0 12px 30px rgba(0,0,0,.18);
  text-align:center;

  opacity:0;
  transform:translateY(25px) scale(.9);

  animation: contentIn .8s 1.9s ease forwards; /* delay paling akhir */
}

@keyframes contentIn{
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

button{
  margin-top:16px;
  padding:12px 22px;
  border:none;
  border-radius:12px;
  background:#6c63ff;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="app">

  <!-- background bunga -->
  <div class="bg"></div>

  <!-- konten -->
  <div class="page">
    <div class="card">
      <h2>Gallery</h2>
      <button>Next</button>
    </div>
  </div>

</div>

</body>
</html>
